name: Deploy ton-jetton-ui to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ton-jetton-ui-pages
  cancel-in-progress: true

jobs:
  build-ton-jetton-ui:
    name: Build ton-jetton-ui
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ton-jetton-ui repo
        uses: actions/checkout@v4

      - name: Setup Node for ton-jetton-ui
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ton-jetton-ui
        run: npm run build

      - name: Create SPA fallback (React)
        run: cp ./dist/index.html ./dist/404.html

      - name: Add .nojekyll
        run: touch ./dist/.nojekyll

      - name: Upload ton-jetton-ui production build
        uses: actions/upload-artifact@v4
        with:
          name: ton-jetton-ui-dist
          path: ./dist

  deploy-ton-jetton-ui:
    name: Deploy ton-jetton-ui
    needs: build-ton-jetton-ui
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download ton-jetton-ui build
        uses: actions/download-artifact@v4
        with:
          name: ton-jetton-ui-dist
          path: ./dist

      - name: Deploy ton-jetton-ui to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
